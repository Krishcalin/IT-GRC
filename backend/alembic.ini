[alembic]
script_location = alembic
# Put the backend dir (cwd) on sys.path so env.py can import the `app` package
# regardless of how alembic is invoked (console script or `python -m alembic`).
prepend_sys_path = .
# NOTE: env.py overrides this at runtime with settings.DATABASE_URL (env-driven).
sqlalchemy.url = postgresql+asyncpg://grc:changeme@db:5432/itgrc

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
