<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shield" x1="50" y1="60" x2="50" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.04)" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="rgba(99,102,241,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- Decorative border lines -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#accent)" opacity="0.3"/>
  <rect x="0" y="319" width="1200" height="1" fill="url(#accent)" opacity="0.3"/>
  <rect x="0" y="316" width="1200" height="4" fill="url(#accent)" opacity="0.1"/>

  <!-- Decorative orbs -->
  <circle cx="1050" cy="60" r="120" fill="rgba(99,102,241,0.03)"/>
  <circle cx="1100" cy="260" r="80" fill="rgba(245,158,11,0.03)"/>
  <circle cx="150" cy="280" r="100" fill="rgba(99,102,241,0.02)"/>

  <!-- Shield icon -->
  <g transform="translate(80, 85)">
    <path d="M50 10 L90 30 L90 75 C90 110 70 135 50 145 C30 135 10 110 10 75 L10 30 Z"
          fill="url(#shield)" opacity="0.9" filter="url(#glow)"/>
    <path d="M50 18 L83 35 L83 75 C83 105 66 127 50 136 C34 127 17 105 17 75 L17 35 Z"
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <path d="M35 78 L46 89 L68 62" stroke="url(#check)" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softglow)"/>
    <path d="M50 18 L83 35 L83 55 C60 50 30 55 17 55 L17 35 Z"
          fill="rgba(255,255,255,0.04)"/>
  </g>

  <!-- Main title -->
  <text x="200" y="128" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-0.5">
    IT-GRC Portal
  </text>
  <text x="200" y="160" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">
    ISO 27001:2022 Governance, Risk &amp; Compliance Management
  </text>

  <!-- Divider line -->
  <line x1="200" y1="180" x2="520" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Stat boxes -->
  <!-- Box 1: Controls -->
  <g transform="translate(200, 195)">
    <rect width="120" height="52" rx="8" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#818cf8">93</text>
    <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">CONTROLS</text>
  </g>

  <!-- Box 2: Modules -->
  <g transform="translate(335, 195)">
    <rect width="120" height="52" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#22c55e">8</text>
    <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">MODULES</text>
  </g>

  <!-- Box 3: RBAC Roles -->
  <g transform="translate(470, 195)">
    <rect width="120" height="52" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#f59e0b">6</text>
    <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">RBAC ROLES</text>
  </g>

  <!-- Box 4: Themes -->
  <g transform="translate(605, 195)">
    <rect width="120" height="52" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#ef4444">4</text>
    <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">THEMES</text>
  </g>

  <!-- Right side: ISO certification seal -->
  <g transform="translate(900, 80)" opacity="0.12">
    <!-- Outer ring -->
    <circle cx="55" cy="60" r="55" fill="none" stroke="#6366f1" stroke-width="3"/>
    <circle cx="55" cy="60" r="48" fill="none" stroke="#818cf8" stroke-width="1"/>
    <!-- Inner text -->
    <text x="55" y="50" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" fill="#818cf8">ISO</text>
    <text x="55" y="68" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#6366f1">27001</text>
    <text x="55" y="82" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#818cf8">2022</text>
    <!-- Star decorations -->
    <text x="20" y="17" font-size="8" fill="#818cf8">&#9733;</text>
    <text x="82" y="17" font-size="8" fill="#818cf8">&#9733;</text>
    <text x="55" y="125" font-size="8" fill="#818cf8" text-anchor="middle">&#9733;</text>
  </g>

  <!-- Right side decorative text -->
  <g transform="translate(840, 210)">
    <text x="0" y="0" font-family="'Courier New',monospace" font-size="10" fill="rgba(99,102,241,0.25)" letter-spacing="1">
      RISK  SOA  AUDIT  POLICY  ASSET
    </text>
    <text x="0" y="18" font-family="'Courier New',monospace" font-size="10" fill="rgba(99,102,241,0.15)" letter-spacing="1">
      PASS  FAIL  WARN  IMPL  SKIP
    </text>
  </g>

  <!-- Bottom tags -->
  <g transform="translate(200, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(99,102,241,0.6)">React</text>
  </g>
  <g transform="translate(282, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(34,197,94,0.6)">FastAPI</text>
  </g>
  <g transform="translate(364, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(245,158,11,0.6)">PostgreSQL</text>
  </g>
  <g transform="translate(446, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(239,68,68,0.6)">Docker</text>
  </g>
  <g transform="translate(528, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(168,85,247,0.6)">TypeScript</text>
  </g>
  <g transform="translate(610, 270)">
    <rect width="72" height="22" rx="4" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.2)" stroke-width="0.5"/>
    <text x="36" y="15" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="rgba(56,189,248,0.6)">Tailwind</text>
  </g>

  <!-- Version tag -->
  <g transform="translate(1080, 14)">
    <rect width="56" height="20" rx="4" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="0.5"/>
    <text x="28" y="14" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="600" fill="rgba(99,102,241,0.7)">v1.0.0</text>
  </g>
</svg>
